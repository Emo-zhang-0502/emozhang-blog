<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 一个青年人的自白</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --dark: #1a1a1a;
            --gray-dark: #333333;
            --gray: #666666;
            --gray-light: #999999;
            --gray-lighter: #cccccc;
            --off-white: #f5f5f3;
            --white: #ffffff;
            --cream: #faf8f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--off-white);
            color: var(--black);
            line-height: 1.8;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--off-white); }
        ::-webkit-scrollbar-thumb { background: var(--gray-light); }

        /* 登录页面 */
        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .login-container {
            background: var(--white);
            padding: 4rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--gray-lighter);
        }
        .login-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--gray-lighter);
        }
        .login-title { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
        .login-subtitle { font-size: 0.9rem; font-style: italic; color: var(--gray); }
        .form-group { margin-bottom: 1.5rem; }
        .form-label {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 0.5rem;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 1rem;
            border: 1px solid var(--gray-lighter);
            background: var(--cream);
            transition: border-color 0.3s;
        }
        .form-input:focus { outline: none; border-color: var(--black); }
        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid var(--black);
            background: var(--black);
            color: var(--white);
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { background: var(--white); color: var(--black); }
        .btn-block { width: 100%; text-align: center; }
        .login-error { color: #c00; font-size: 0.85rem; margin-top: 1rem; text-align: center; }

        /* 管理后台 */
        .admin-layout { display: none; }
        .admin-layout.active { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: var(--white);
            border-right: 1px solid var(--gray-lighter);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { padding: 2rem; border-bottom: 1px solid var(--gray-lighter); }
        .sidebar-logo { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.1em; }
        .sidebar-tagline { font-size: 0.8rem; font-style: italic; color: var(--gray); }
        .sidebar-nav { flex: 1; padding: 1rem 0; overflow-y: auto; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            font-size: 0.85rem;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.3s;
            border-left: 2px solid transparent;
        }
        .nav-item:hover { color: var(--black); background: var(--cream); }
        .nav-item.active { color: var(--black); border-left-color: var(--black); background: var(--cream); }
        .nav-icon { width: 20px; margin-right: 1rem; opacity: 0.6; }
        .sidebar-footer { padding: 1.5rem 2rem; border-top: 1px solid var(--gray-lighter); }
        .logout-btn {
            width: 100%;
            padding: 0.75rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid var(--gray-lighter);
            background: transparent;
            color: var(--gray);
            cursor: pointer;
        }
        .logout-btn:hover { border-color: var(--black); color: var(--black); }

        .main-content { flex: 1; margin-left: 280px; padding: 3rem; min-height: 100vh; }
        .page-header { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--gray-lighter); }
        .page-title { font-size: 2rem; font-weight: 300; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .page-subtitle { font-size: 1rem; font-style: italic; color: var(--gray); }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-section { background: var(--white); border: 1px solid var(--gray-lighter); padding: 2rem; margin-bottom: 2rem; }
        .form-section-title { font-size: 1rem; font-weight: 500; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-lighter); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        textarea.form-input { min-height: 100px; resize: vertical; }

        .message { padding: 1rem 1.5rem; margin-bottom: 1.5rem; font-size: 0.85rem; border-left: 3px solid; }
        .message.success { background: #f0f9f0; border-color: #4a4; color: #2a2; }
        .message.error { background: #fff5f5; border-color: #c44; color: #a22; }

        .config-list { margin-top: 1.5rem; }
        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--off-white);
            margin-bottom: 0.5rem;
            border: 1px solid var(--gray-lighter);
        }
        .config-key { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--gray); }
        .config-value { flex: 1; margin: 0 1rem; text-align: center; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-page">
        <div class="login-container">
            <div class="login-header">
                <h1 class="login-title">一个青年人的自白</h1>
                <p class="login-subtitle">后台管理系统</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">管理员账号</label>
                    <input type="text" id="loginUsername" class="form-input" placeholder="请输入账号" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-block">登录</button>
                <div id="loginError" class="login-error"></div>
            </form>
        </div>
    </div>

    <!-- 管理后台 -->
    <div id="adminLayout" class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">一个青年人的自白</div>
                <div class="sidebar-tagline">Admin Panel</div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" data-panel="config">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                    </svg>
                    网站配置
                </div>
                <div class="nav-item" data-panel="articles">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 4h16v16H4z M8 8h8 M8 12h8 M8 16h4"/>
                    </svg>
                    文章管理
                </div>
                <div class="nav-item" data-panel="music">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                    </svg>
                    音乐管理
                </div>
                <div class="nav-item" data-panel="visual">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
                    </svg>
                    影像管理
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </aside>

        <main class="main-content">
            <!-- 网站配置 -->
            <section id="panel-config" class="panel active">
                <div class="page-header">
                    <h1 class="page-title">网站配置</h1>
                    <p class="page-subtitle">修改网站前台显示的所有内容</p>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">网站基本信息</h3>
                    <form id="configForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">网站标题（大标题）</label>
                                <input type="text" id="cfg-site_title" class="form-input" placeholder="如: 一个青年人的自白">
                            </div>
                            <div class="form-group">
                                <label class="form-label">英文副标题</label>
                                <input type="text" id="cfg-site_subtitle" class="form-input" placeholder="如: Confessions of a Young Soul">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">封面期号</label>
                                <input type="text" id="cfg-cover_issue" class="form-input" placeholder="如: Vol. 01">
                            </div>
                            <div class="form-group">
                                <label class="form-label">封面日期</label>
                                <input type="text" id="cfg-cover_date" class="form-input" placeholder="如: 2024 · 春">
                            </div>
                        </div>
                        <button type="submit" class="btn">保存基本配置</button>
                    </form>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">封面介绍语</h3>
                    <form id="coverForm">
                        <div class="form-group">
                            <label class="form-label">目录标签</label>
                            <input type="text" id="cfg-toc_label" class="form-input" placeholder="如: 目录 Contents">
                        </div>
                        <div class="form-group">
                            <label class="form-label">封面描述（支持换行用 &lt;br&gt;）</label>
                            <textarea id="cfg-cover_description" class="form-input" rows="3" placeholder="用文字记录成长，用影像捕捉瞬间..."></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">封面引言</label>
                            <textarea id="cfg-cover_quote" class="form-input" rows="2" placeholder="如: "不迎合，不妥协，只为真诚表达。"" ></textarea>
                        </div>
                        <button type="submit" class="btn">保存封面配置</button>
                    </form>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">板块名称（导航和标题）</h3>
                    <form id="sectionsForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">文字板块 - 中文</label>
                                <input type="text" id="cfg-writing-title" class="form-input" placeholder="如: 文字">
                            </div>
                            <div class="form-group">
                                <label class="form-label">文字板块 - 英文</label>
                                <input type="text" id="cfg-writing-subtitle" class="form-input" placeholder="如: Writing">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">影像板块 - 中文</label>
                                <input type="text" id="cfg-visual-title" class="form-input" placeholder="如: 影像">
                            </div>
                            <div class="form-group">
                                <label class="form-label">影像板块 - 英文</label>
                                <input type="text" id="cfg-visual-subtitle" class="form-input" placeholder="如: Visual">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">音乐板块 - 中文</label>
                                <input type="text" id="cfg-music-title" class="form-input" placeholder="如: 音乐">
                            </div>
                            <div class="form-group">
                                <label class="form-label">音乐板块 - 英文</label>
                                <input type="text" id="cfg-music-subtitle" class="form-input" placeholder="如: Music">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">关于板块 - 中文</label>
                                <input type="text" id="cfg-about-title" class="form-input" placeholder="如: 关于">
                            </div>
                            <div class="form-group">
                                <label class="form-label">关于板块 - 英文</label>
                                <input type="text" id="cfg-about-subtitle" class="form-input" placeholder="如: About">
                            </div>
                        </div>
                        <button type="submit" class="btn">保存板块配置</button>
                    </form>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">IP形象（关于页面）</h3>
                    <form id="ipForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">形象名称</label>
                                <input type="text" id="cfg-ip_name" class="form-input" placeholder="如: 青">
                            </div>
                            <div class="form-group">
                                <label class="form-label">形象简介</label>
                                <input type="text" id="cfg-ip_bio" class="form-input" placeholder="如: 记录者 / 思考者">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">形象图片URL</label>
                            <input type="url" id="cfg-ip_image" class="form-input" placeholder="https://...">
                        </div>
                        <button type="submit" class="btn">保存IP形象</button>
                    </form>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">页脚信息</h3>
                    <form id="footerForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">页脚标题</label>
                                <input type="text" id="cfg-footer_text" class="form-input" placeholder="如: 一个青年人的自白">
                            </div>
                            <div class="form-group">
                                <label class="form-label">版权信息</label>
                                <input type="text" id="cfg-footer_copyright" class="form-input" placeholder="如: © 2024 Youth Confession">
                            </div>
                        </div>
                        <button type="submit" class="btn">保存页脚配置</button>
                    </form>
                </div>

                <div class="form-section">
                    <h3 class="form-section-title">当前配置预览</h3>
                    <div class="config-list" id="configPreview">
                        <p style="color: var(--gray); padding: 1rem;">加载中...</p>
                    </div>
                </div>
            </section>

            <!-- 文章管理 -->
            <section id="panel-articles" class="panel">
                <div class="page-header">
                    <h1 class="page-title">文章管理</h1>
                    <p class="page-subtitle">管理你的文字作品</p>
                </div>
                <div class="form-section">
                    <h3 class="form-section-title">添加新文章</h3>
                    <form id="articleForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">文章标题</label>
                                <input type="text" id="article-title" class="form-input" placeholder="输入标题" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">标签</label>
                                <input type="text" id="article-tags" class="form-input" placeholder="多个标签用逗号分隔">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">文章摘要/内容</label>
                            <textarea id="article-content" class="form-input" rows="4" placeholder="输入文章内容..." required></textarea>
                        </div>
                        <button type="submit" class="btn">发布文章</button>
                    </form>
                </div>
                <div id="articlesList"></div>
            </section>

            <!-- 音乐管理 -->
            <section id="panel-music" class="panel">
                <div class="page-header">
                    <h1 class="page-title">音乐管理</h1>
                    <p class="page-subtitle">管理音乐推荐和创作</p>
                </div>
                <div class="form-section">
                    <h3 class="form-section-title">添加音乐曲目</h3>
                    <form id="musicForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">歌曲名称</label>
                                <input type="text" id="music-title" class="form-input" placeholder="歌曲名 - 歌手" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">类型</label>
                                <select id="music-type" class="form-input">
                                    <option value="recent">最近在听</option>
                                    <option value="favorite">收藏歌单</option>
                                    <option value="creation">我的创作</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">外部链接（网易云/QQ音乐等）或音频URL</label>
                            <input type="url" id="music-url" class="form-input" placeholder="https://...">
                        </div>
                        <button type="submit" class="btn">添加曲目</button>
                    </form>
                </div>
                <div id="musicList"></div>
            </section>

            <!-- 影像管理 -->
            <section id="panel-visual" class="panel">
                <div class="page-header">
                    <h1 class="page-title">影像管理</h1>
                    <p class="page-subtitle">管理摄影和视频作品</p>
                </div>
                <div class="form-section">
                    <h3 class="form-section-title">添加影像作品</h3>
                    <form id="visualForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">作品标题</label>
                                <input type="text" id="visual-title" class="form-input" placeholder="输入标题" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">类型</label>
                                <select id="visual-category" class="form-input">
                                    <option value="photo">摄影</option>
                                    <option value="video">视频</option>
                                    <option value="short">短片</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">封面图片URL</label>
                            <input type="url" id="visual-cover" class="form-input" placeholder="https://..." required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">描述/说明</label>
                            <textarea id="visual-desc" class="form-input" rows="2" placeholder="简短描述..."></textarea>
                        </div>
                        <button type="submit" class="btn">上传作品</button>
                    </form>
                </div>
                <div id="visualList"></div>
            </section>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://axrxgqotyjxwjaanjzvg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4cnhncW90eWp4d2phYW5qenZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ2MjU1MDB9.lR0j6GcLgN6L8V6K0L8V6K0L8V6K0L8V6K0L8V6K0';

        // 简单的Supabase REST API调用
        async function supabaseRequest(table, options = {}) {
            const { method = 'GET', body, filters } = options;
            let endpoint = `${SUPABASE_URL}/rest/v1/${table}`;
            if (filters) endpoint += '?' + filters;
            
            const response = await fetch(endpoint, {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Prefer': method !== 'GET' ? 'return=representation' : ''
                },
                body: body ? JSON.stringify(body) : undefined
            });
            
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch {
                return text;
            }
        }

        function showMessage(type, text) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            document.querySelector('.panel.active').insertBefore(msg, document.querySelector('.form-section'));
            setTimeout(() => msg.remove(), 3000);
        }

        // 登录
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (username === 'admin' && password === 'emozhang2024') {
                localStorage.setItem('admin_token', 'demo');
                showAdminPanel();
            } else {
                document.getElementById('loginError').textContent = '账号或密码错误';
            }
        });

        function logout() {
            localStorage.removeItem('admin_token');
            location.reload();
        }

        function showAdminPanel() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminLayout').classList.add('active';
            loadAll();
        }

        // 导航
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                item.classList.add('active');
                document.getElementById('panel-' + item.dataset.panel).classList.add('active');
            });
        });

        // ========================================
        // 网站配置
        // ========================================
        async function loadSiteConfig() {
            const data = await supabaseRequest('site_config');
            if (Array.isArray(data)) {
                data.forEach(item => {
                    const el = document.getElementById('cfg-' + item.key);
                    if (el) el.value = item.value || '';
                });
                renderConfigPreview(data);
            }
        }

        function renderConfigPreview(configs) {
            const container = document.getElementById('configPreview');
            if (!Array.isArray(configs)) {
                container.innerHTML = '<p style="color: var(--gray); padding: 1rem;">暂无配置数据</p>';
                return;
            }
            container.innerHTML = configs.map(c => `
                <div class="config-item">
                    <span class="config-key">${c.key}</span>
                    <span class="config-value">${c.value || '(未设置)'}</span>
                </div>
            `).join('');
        }

        async function saveConfig(key, value) {
            const existing = await supabaseRequest(`site_config?key=eq.${key}`);
            if (Array.isArray(existing) && existing.length > 0) {
                await supabaseRequest(`site_config?key=eq.${key}`, {
                    method: 'PATCH',
                    body: { value, updated_at: new Date().toISOString() }
                });
            } else {
                await supabaseRequest('site_config', {
                    method: 'POST',
                    body: { key, value }
                });
            }
        }

        // 基本配置表单
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const configs = [
                ['site_title', document.getElementById('cfg-site_title').value],
                ['site_subtitle', document.getElementById('cfg-site_subtitle').value],
                ['cover_issue', document.getElementById('cfg-cover_issue').value],
                ['cover_date', document.getElementById('cfg-cover_date').value]
            ];
            for (const [key, value] of configs) {
                await saveConfig(key, value);
            }
            showMessage('success', '基本配置已保存');
            loadSiteConfig();
        });

        // 封面配置表单
        document.getElementById('coverForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const configs = [
                ['toc_label', document.getElementById('cfg-toc_label').value],
                ['cover_description', document.getElementById('cfg-cover_description').value],
                ['cover_quote', document.getElementById('cfg-cover_quote').value]
            ];
            for (const [key, value] of configs) {
                await saveConfig(key, value);
            }
            showMessage('success', '封面配置已保存');
            loadSiteConfig();
        });

        // 板块配置表单
        document.getElementById('sectionsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sections = ['writing', 'visual', 'music', 'about'];
            for (const key of sections) {
                const title = document.getElementById('cfg-' + key + '-title').value;
                const subtitle = document.getElementById('cfg-' + key + '-subtitle').value;
                const existing = await supabaseRequest(`sections?section_key=eq.${key}`);
                if (Array.isArray(existing) && existing.length > 0) {
                    await supabaseRequest(`sections?section_key=eq.${key}`, {
                        method: 'PATCH',
                        body: { title, subtitle, updated_at: new Date().toISOString() }
                    });
                } else {
                    await supabaseRequest('sections', {
                        method: 'POST',
                        body: { section_key: key, title, subtitle, display_order: sections.indexOf(key) + 1 }
                    });
                }
            }
            showMessage('success', '板块配置已保存');
            loadSiteConfig();
        });

        // IP形象表单
        document.getElementById('ipForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('cfg-ip_name').value,
                bio: document.getElementById('cfg-ip_bio').value,
                image_url: document.getElementById('cfg-ip_image').value,
                updated_at: new Date().toISOString()
            };
            const existing = await supabaseRequest('ip_config?limit=1');
            if (Array.isArray(existing) && existing.length > 0) {
                await supabaseRequest(`ip_config?id=eq.${existing[0].id}`, {
                    method: 'PATCH',
                    body: data
                });
            } else {
                await supabaseRequest('ip_config', { method: 'POST', body: data });
            }
            showMessage('success', 'IP形象已保存');
            loadSiteConfig();
        });

        // 页脚配置表单
        document.getElementById('footerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const configs = [
                ['footer_text', document.getElementById('cfg-footer_text').value],
                ['footer_copyright', document.getElementById('cfg-footer_copyright').value]
            ];
            for (const [key, value] of configs) {
                await saveConfig(key, value);
            }
            showMessage('success', '页脚配置已保存');
            loadSiteConfig();
        });

        // ========================================
        // 文章管理
        // ========================================
        document.getElementById('articleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('article-title').value,
                content: document.getElementById('article-content').value,
                tags: document.getElementById('article-tags').value,
                created_at: new Date().toISOString()
            };
            await supabaseRequest('posts', { method: 'POST', body: data });
            showMessage('success', '文章发布成功');
            e.target.reset();
            loadArticles();
        });

        async function loadArticles() {
            const container = document.getElementById('articlesList');
            const data = await supabaseRequest('posts?order=created_at.desc');
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = '<p style="color: var(--gray); padding: 2rem;">暂无文章</p>';
                return;
            }
            container.innerHTML = data.map(a => `
                <div class="form-section">
                    <h3 class="form-section-title">${a.title}</h3>
                    <p style="color: var(--gray); font-size: 0.85rem; margin-bottom: 1rem;">标签: ${a.tags || '无'} | ${new Date(a.created_at).toLocaleDateString()}</p>
                    <p>${a.content?.substring(0, 100)}...</p>
                </div>
            `).join('');
        }

        // ========================================
        // 音乐管理
        // ========================================
        document.getElementById('musicForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('music-title').value,
                type: document.getElementById('music-type').value,
                audio_url: document.getElementById('music-url').value,
                created_at: new Date().toISOString()
            };
            await supabaseRequest('music_tracks', { method: 'POST', body: data });
            showMessage('success', '曲目添加成功');
            e.target.reset();
            loadMusic();
        });

        async function loadMusic() {
            const container = document.getElementById('musicList');
            const data = await supabaseRequest('music_tracks?order=created_at.desc');
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = '<p style="color: var(--gray); padding: 2rem;">暂无音乐</p>';
                return;
            }
            const typeMap = { recent: '最近在听', favorite: '收藏歌单', creation: '我的创作' };
            container.innerHTML = data.map(t => `
                <div class="form-section">
                    <h3 class="form-section-title">${t.title}</h3>
                    <p style="color: var(--gray); font-size: 0.85rem;">类型: ${typeMap[t.type] || t.type}</p>
                    ${t.audio_url ? `<p style="margin-top: 0.5rem;"><a href="${t.audio_url}" target="_blank">打开链接</a></p>` : ''}
                </div>
            `).join('');
        }

        // ========================================
        // 影像管理
        // ========================================
        document.getElementById('visualForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const category = document.getElementById('visual-category').value;
            const data = {
                title: document.getElementById('visual-title').value,
                category: category,
                image_url: document.getElementById('visual-cover').value,
                description: document.getElementById('visual-desc').value,
                created_at: new Date().toISOString()
            };
            await supabaseRequest('photos', { method: 'POST', body: data });
            showMessage('success', '作品上传成功');
            e.target.reset();
            loadVisual();
        });

        async function loadVisual() {
            const container = document.getElementById('visualList');
            const data = await supabaseRequest('photos?order=created_at.desc');
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = '<p style="color: var(--gray); padding: 2rem;">暂无影像</p>';
                return;
            }
            container.innerHTML = data.map(v => `
                <div class="form-section">
                    <h3 class="form-section-title">${v.title}</h3>
                    <p style="color: var(--gray); font-size: 0.85rem;">类型: ${v.category}</p>
                    ${v.image_url ? `<img src="${v.image_url}" style="max-width: 200px; margin-top: 1rem;" onerror="this.style.display='none'">` : ''}
                    <p style="margin-top: 0.5rem;">${v.description || ''}</p>
                </div>
            `).join('');
        }

        // ========================================
        // 初始化
        // ========================================
        async function loadAll() {
            await loadSiteConfig();
            await loadArticles();
            await loadMusic();
            await loadVisual();
        }

        if (localStorage.getItem('admin_token')) {
            showAdminPanel();
        }
    </script>
</body>
</html>
