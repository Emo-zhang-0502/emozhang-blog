<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 后台管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #F5F5F3;
            --color-card: #FFFFFF;
            --color-text: #2D2D2D;
            --color-text-secondary: #6B6B6B;
            --color-accent: #E07A3A;
            --color-border: #E8E6E3;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--color-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: var(--color-card);
            padding: 48px;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        
        .login-logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .login-logo span { color: var(--color-accent); }
        
        .login-subtitle {
            text-align: center;
            color: var(--color-text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--color-accent);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            background: var(--color-accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .login-btn:hover {
            background: #c9682e;
        }
        
        .login-error {
            color: #E53E3E;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="login-logo">一个青年人的<span>自白</span></h1>
        <p class="login-subtitle">后台管理系统</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">管理员账号</label>
                <input type="text" id="username" class="form-input" placeholder="请输入账号" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn">登录</button>
            <p id="loginError" class="login-error"></p>
        </form>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://axrxgqotyjxwjaanjzvg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4cnhncW90eWp4d2phYW5qenZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODEzMjcsImV4cCI6MjA4OTU1NzMyN30.1t6vJFvVa-iXHlc4YXNBBvWiN97Ydd8Zvmy75cCblPw';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 离线模式
            if (username === 'admin' && password === 'emozhang2024') {
                sessionStorage.setItem('admin_logged_in', 'true');
                sessionStorage.setItem('admin_id', '1');
                sessionStorage.setItem('admin_nickname', '管理员');
                window.location.href = 'admin-main.html';
                return;
            }
            
            // 在线验证
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/admins?username=eq.${username}&password=eq.${password}`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const admin = data[0];
                    sessionStorage.setItem('admin_logged_in', 'true');
                    sessionStorage.setItem('admin_id', admin.id.toString());
                    sessionStorage.setItem('admin_nickname', admin.nickname || admin.username);
                    window.location.href = 'admin-main.html';
                } else {
                    document.getElementById('loginError').textContent = '账号或密码错误';
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('loginError').textContent = '网络错误，请使用离线账号登录';
                document.getElementById('loginError').style.display = 'block';
            }
        });
    </script>
</body>
</html>
