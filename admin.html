<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理登录 - 一个青年人的自白</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #FAFAF8;
            --color-card: #FFFFFF;
            --color-text: #2D2D2D;
            --color-text-secondary: #6B6B6B;
            --color-accent: #E07A3A;
            --color-accent-light: #FDF4EE;
            --color-border: #E8E6E3;
            --color-error: #E53E3E;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--color-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-card {
            background: var(--color-card);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            background: var(--color-bg);
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px var(--color-accent-light);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            background: var(--color-accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-btn:hover {
            background: #c96a2f;
            transform: translateY(-1px);
        }
        
        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            display: none;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--color-error);
            background: #FFF5F5;
            border: 1px solid #FED7D7;
            border-radius: 8px;
        }
        
        .error-message.show {
            display: block;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--color-text-secondary);
            text-decoration: none;
        }
        
        .back-link:hover {
            color: var(--color-accent);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">后台管理</h1>
                <p class="login-subtitle">一个青年人的自白</p>
            </div>
            
            <div class="error-message" id="error-message"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                </div>
                
                <button type="submit" class="login-btn" id="login-btn">登录</button>
            </form>
            
            <a href="index.html" class="back-link">← 返回网站</a>
        </div>
    </div>
    
    <script>
        // Supabase 配置 - 请替换为你自己的 key
        const SUPABASE_URL = 'https://axrxgqotyjxwjaanjzvg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4cnhncW90eWp4d2phYW5qenZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODEzMjcsImV4cCI6MjA4OTU1NzMyN30.1t6vJFvVa-iXHlc4YXNBBvWiN97Ydd8Zvmy75cCblPw';
        
        // 保存到本地存储
        localStorage.setItem('supabase_url', SUPABASE_URL);
        localStorage.setItem('supabase_anon_key', SUPABASE_ANON_KEY);
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-message');
            
            if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
                errorMsg.textContent = '请先配置 Supabase 连接信息';
                errorMsg.classList.add('show');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            errorMsg.classList.remove('show');
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/admins?username=eq.${encodeURIComponent(username)}`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('数据库连接失败，请检查 Supabase 配置');
                }
                
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    throw new Error('用户名不存在，请先在数据库创建管理员');
                }
                
                const admin = data[0];
                
                if (!admin || !admin.password_hash) {
                    throw new Error('管理员数据异常，请检查数据库');
                }
                
                // 简单密码验证
                if (admin.password_hash !== password) {
                    throw new Error('密码错误');
                }
                
                // 登录成功，保存会话
                sessionStorage.setItem('admin_logged_in', 'true');
                sessionStorage.setItem('admin_id', admin.id);
                sessionStorage.setItem('admin_nickname', admin.nickname);
                sessionStorage.setItem('admin_username', admin.username);
                
                window.location.href = 'admin-main.html';
                
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
