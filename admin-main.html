<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 一个青年人的自白</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --color-bg: #F5F5F3;
            --color-card: #FFFFFF;
            --color-text: #2D2D2D;
            --color-text-secondary: #6B6B6B;
            --color-text-muted: #999;
            --color-accent: #E07A3A;
            --color-accent-light: #FDF4EE;
            --color-border: #E8E6E3;
            --color-success: #38A169;
            --color-error: #E53E3E;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
            --radius: 10px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: var(--color-card);
            border-right: 1px solid var(--color-border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            font-weight: 700;
            padding: 0 12px 24px;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 24px;
        }
        
        .sidebar-logo span { color: var(--color-accent); }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--color-text-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        
        .nav-item:hover {
            background: var(--color-bg);
            color: var(--color-text);
        }
        
        .nav-item.active {
            background: var(--color-accent-light);
            color: var(--color-accent);
            font-weight: 500;
        }
        
        .nav-item svg { width: 20px; height: 20px; }
        
        .sidebar-footer {
            margin-top: auto;
            padding-top: 24px;
            border-top: 1px solid var(--color-border);
        }
        
        /* 主内容区 */
        .main {
            margin-left: 240px;
            min-height: 100vh;
        }
        
        .header {
            background: var(--color-card);
            padding: 16px 32px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-title { font-size: 16px; font-weight: 500; }
        
        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-avatar {
            width: 36px;
            height: 36px;
            background: var(--color-accent-light);
            color: var(--color-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        
        .logout-btn {
            padding: 8px 16px;
            font-size: 13px;
            color: var(--color-text-secondary);
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            color: var(--color-error);
            border-color: var(--color-error);
        }
        
        .content { padding: 32px; }
        
        /* 面板 */
        .panel { display: none; }
        .panel.active { display: block; }
        
        .card {
            background: var(--color-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--color-border);
        }
        
        /* 表单 */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .form-group { margin-bottom: 16px; }
        
        .form-label {
            display: block;
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: 6px;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            background: var(--color-bg);
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--color-accent);
        }
        
        .btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--color-accent);
            color: white;
            border: none;
        }
        
        .btn-primary:hover { background: #c9682e; }
        
        .btn-outline {
            background: transparent;
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }
        
        .btn-outline:hover { border-color: var(--color-accent); color: var(--color-accent); }
        
        .btn-danger {
            background: transparent;
            color: var(--color-error);
            border: 1px solid var(--color-error);
        }
        
        .btn-danger:hover { background: var(--color-error); color: white; }
        
        /* 上传按钮 */
        .upload-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .file-input {
            display: none;
        }
        
        .file-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--color-bg);
            border: 1px dashed var(--color-border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--color-text-secondary);
            transition: all 0.2s;
        }
        
        .file-label:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }
        
        .file-name {
            font-size: 13px;
            color: var(--color-success);
        }
        
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* Quill 编辑器 */
        #editor { height: 300px; margin-bottom: 16px; }
        .ql-toolbar { border-radius: 6px 6px 0 0; }
        .ql-container { border-radius: 0 0 6px 6px; font-family: 'Noto Serif SC', serif; font-size: 15px; }
        
        /* 列表 */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--color-bg);
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .item:hover { background: #EEECEA; }
        
        .item-info { flex: 1; }
        
        .item-title { font-weight: 500; margin-bottom: 4px; }
        
        .item-meta { font-size: 12px; color: var(--color-text-muted); }
        
        .item-actions { display: flex; gap: 8px; }
        
        .item-actions .btn {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* 标签 */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            font-size: 12px;
            background: var(--color-accent-light);
            color: var(--color-accent);
            border-radius: 4px;
            margin-right: 8px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--color-text-muted);
        }
        
        /* 消息提示 */
        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        .message.success { background: #C6F6D5; color: #276749; }
        .message.error { background: #FED7D7; color: #C53030; }
        
        /* 活动记录列表 */
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 8px;
        }
        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .activity-icon svg { width: 18px; height: 18px; }
        .activity-icon.create { background: #C6F6D5; color: #276749; }
        .activity-icon.update { background: #FEFCBF; color: #744210; }
        .activity-icon.delete { background: #FED7D7; color: #C53030; }
        .activity-content { flex: 1; }
        .activity-title { font-size: 14px; color: var(--color-text); }
        .activity-time { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; }
        
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--color-card);
            padding: 32px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 500px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .modal-actions .btn { flex: 1; }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 12px 16px;
                border-right: none;
                border-bottom: 1px solid var(--color-border);
            }
            
            .sidebar-logo {
                padding: 0;
                border-bottom: none;
                margin-bottom: 0;
                font-size: 16px;
            }
            
            nav {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                flex: 1;
            }
            
            .nav-item {
                padding: 8px 12px;
                font-size: 12px;
                margin-bottom: 0;
            }
            
            .nav-item svg { display: none; }
            
            .sidebar-footer {
                margin-top: 0;
                padding-top: 0;
                border-top: none;
            }
            
            .logout-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
            
            .main {
                margin-left: 0;
            }
            
            .header {
                padding: 12px 16px;
            }
            
            .header-title {
                font-size: 14px;
            }
            
            .content {
                padding: 16px;
            }
            
            .card {
                padding: 16px;
                margin-bottom: 16px;
            }
            
            .card-title {
                font-size: 14px;
                margin-bottom: 16px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .form-group {
                margin-bottom: 12px;
            }
            
            .form-input, .form-select, .form-textarea {
                padding: 10px 12px;
                font-size: 14px;
            }
            
            .btn {
                padding: 10px 16px;
                font-size: 14px;
                width: 100%;
            }
            
            .upload-box {
                flex-direction: column;
            }
            
            .item {
                flex-direction: column;
                gap: 12px;
            }
            
            .item-info {
                width: 100%;
            }
            
            .item-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-logo">一个青年人的<span>自白</span></div>
        
        <nav>
            <div class="nav-item active" data-panel="articles">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8M16 17H8M10 9H8"/></svg>
                文章管理
            </div>
            <div class="nav-item" data-panel="photos">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                影像管理
            </div>
            <div class="nav-item" data-panel="music">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                音乐管理
            </div>
            <div class="nav-item" data-panel="settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                网站配置
            </div>
            <div class="nav-item" data-panel="activity">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                活动记录
            </div>
            <div class="nav-item" data-panel="account">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                账户设置
            </div>
        </nav>
        
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </aside>
    
    <!-- 主内容 -->
    <main class="main">
        <header class="header">
            <h1 class="header-title" id="pageTitle">文章管理</h1>
            <div class="header-user">
                <div class="header-avatar" id="user-avatar">管</div>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </header>
        
        <div class="content">
            <!-- 文章管理 -->
            <section id="panel-articles" class="panel active">
                <div class="card">
                    <h2 class="card-title">发布新文章</h2>
                    <form id="articleForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">文章标题</label>
                                <input type="text" id="article-title" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">分类</label>
                                <select id="article-tag" class="form-select">
                                    <option value="随想">随想</option>
                                    <option value="洞察">洞察</option>
                                    <option value="书单">书单</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">封面图片</label>
                            <div class="upload-box">
                                <input type="file" id="article-cover-file" accept="image/*" class="file-input">
                                <label for="article-cover-file" class="file-label">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    选择封面图片
                                </label>
                                <span id="article-cover-file-name" class="file-name"></span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">或输入封面URL</label>
                            <input type="url" id="article-cover" class="form-input" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">文章内容</label>
                            <div id="editor"></div>
                        </div>
                        <button type="submit" class="btn btn-primary">发布文章</button>
                    </form>
                </div>
                
                <div class="card">
                    <h2 class="card-title">文章列表</h2>
                    <div id="articlesList" class="item-list"></div>
                </div>
            </section>
            
            <!-- 编辑文章模态框 -->
            <div id="editModal" class="modal-overlay">
                <div class="modal">
                    <h3 class="modal-title">编辑文章</h3>
                    <form id="editForm">
                        <input type="hidden" id="edit-article-id">
                        <div class="form-group">
                            <label class="form-label">文章标题</label>
                            <input type="text" id="edit-article-title" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">分类</label>
                            <select id="edit-article-tag" class="form-select">
                                <option value="随想">随想</option>
                                <option value="洞察">洞察</option>
                                <option value="书单">书单</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">封面图片URL</label>
                            <input type="url" id="edit-article-cover" class="form-input" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">文章内容</label>
                            <div id="edit-editor" style="height: 200px;"></div>
                        </div>
                        <div class="modal-actions">
                            <button type="button" class="btn" onclick="document.getElementById('editModal').classList.remove('active')">取消</button>
                            <button type="submit" class="btn btn-primary">保存修改</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- 影像管理 -->
            <section id="panel-photos" class="panel">
                <div class="card">
                    <h2 class="card-title">添加影像作品</h2>
                    <form id="photoForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">作品标题</label>
                                <input type="text" id="photo-title" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">分类</label>
                                <select id="photo-category" class="form-select">
                                    <option value="摄影">摄影</option>
                                    <option value="视频">视频</option>
                                    <option value="短片">短片</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">上传图片</label>
                            <div class="upload-box">
                                <input type="file" id="photo-file" accept="image/*" class="file-input">
                                <label for="photo-file" class="file-label">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    选择图片文件
                                </label>
                                <span id="photo-file-name" class="file-name"></span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">或输入图片URL</label>
                            <input type="url" id="photo-url" class="form-input" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">描述</label>
                            <input type="text" id="photo-desc" class="form-input">
                        </div>
                        <button type="submit" class="btn btn-primary" id="photo-submit-btn">添加作品</button>
                    </form>
                </div>
                
                <div class="card">
                    <h2 class="card-title">影像列表</h2>
                    <div id="photosList" class="item-list"></div>
                </div>
            </section>
            
            <!-- 音乐管理 -->
            <section id="panel-music" class="panel">
                <div class="card">
                    <h2 class="card-title">添加音乐</h2>
                    <form id="musicForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">歌曲名称</label>
                                <input type="text" id="music-title" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">歌手/艺术家</label>
                                <input type="text" id="music-artist" class="form-input">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">分类</label>
                                <select id="music-type" class="form-select">
                                    <option value="recent">最近在听</option>
                                    <option value="favorite">推荐歌单</option>
                                    <option value="creation">我的创作</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">时长（如 3:42）</label>
                                <input type="text" id="music-duration" class="form-input" placeholder="3:42">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">描述（仅用于"我的创作"）</label>
                            <input type="text" id="music-desc" class="form-input" placeholder="简要描述...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">标签（仅用于"我的创作"，如 AI/原创）</label>
                            <input type="text" id="music-tag" class="form-input" placeholder="AI">
                        </div>
                        <div class="form-group">
                            <label class="form-label">上传音频文件</label>
                            <div class="upload-box">
                                <input type="file" id="music-file" accept="audio/*" class="file-input">
                                <label for="music-file" class="file-label">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    选择音频文件
                                </label>
                                <span id="music-file-name" class="file-name"></span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">或输入音频URL</label>
                            <input type="url" id="music-url" class="form-input" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">歌词（LRC格式，选填）</label>
                            <textarea id="music-lyrics" class="form-input" rows="6" placeholder="[00:00] 第一句歌词&#10;[00:05] 第二句歌词&#10;支持LRC格式歌词文件粘贴"></textarea>
                            <small style="color: var(--color-text-muted); font-size: 12px;">支持LRC格式，如：[00:00] 歌词内容</small>
                        </div>
                        <div class="form-group">
                            <label class="form-label">封面图片URL（选填）</label>
                            <input type="url" id="music-cover" class="form-input" placeholder="https://...">
                        </div>
                        <button type="submit" class="btn btn-primary" id="music-submit-btn">添加音乐</button>
                    </form>
                </div>
                
                <div class="card">
                    <h2 class="card-title">音乐列表</h2>
                    <div id="musicList" class="item-list"></div>
                </div>
            </section>
            
            <!-- 编辑音乐模态框 -->
            <div id="editMusicModal" class="modal-overlay">
                <div class="modal">
                    <h3 class="modal-title">编辑音乐</h3>
                    <form id="editMusicForm">
                        <input type="hidden" id="edit-music-id">
                        <div class="form-group">
                            <label class="form-label">歌曲标题</label>
                            <input type="text" id="edit-music-title" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">艺术家</label>
                            <input type="text" id="edit-music-artist" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">类型</label>
                            <select id="edit-music-type" class="form-select">
                                <option value="recent">最近在听</option>
                                <option value="favorite">推荐歌单</option>
                                <option value="creation">我的创作</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">时长（秒）</label>
                                <input type="number" id="edit-music-duration" class="form-input" placeholder="180">
                            </div>
                            <div class="form-group">
                                <label class="form-label">标签（如 AI）</label>
                                <input type="text" id="edit-music-tag" class="form-input">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">音频URL</label>
                            <input type="url" id="edit-music-url" class="form-input" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">描述</label>
                            <input type="text" id="edit-music-desc" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">歌词（LRC格式）</label>
                            <textarea id="edit-music-lyrics" class="form-input" rows="4" placeholder="[00:00] 第一句歌词"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">封面图片URL</label>
                            <input type="url" id="edit-music-cover" class="form-input" placeholder="https://...">
                        </div>
                        <div class="modal-actions">
                            <button type="button" class="btn" onclick="document.getElementById('editMusicModal').classList.remove('active')">取消</button>
                            <button type="submit" class="btn btn-primary">保存修改</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- 网站配置 -->
            <section id="panel-settings" class="panel">
                <div class="card">
                    <h2 class="card-title">封面配置</h2>
                    <form id="settingsForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">网站标题</label>
                                <input type="text" id="cfg-site_title" class="form-input" placeholder="一个青年人的自白">
                            </div>
                            <div class="form-group">
                                <label class="form-label">英文副标题</label>
                                <input type="text" id="cfg-site_subtitle" class="form-input" placeholder="Confessions of a Young Soul">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">封面期号</label>
                                <input type="text" id="cfg-cover_issue" class="form-input" placeholder="Vol. 01">
                            </div>
                            <div class="form-group">
                                <label class="form-label">封面日期</label>
                                <input type="text" id="cfg-cover_date" class="form-input" placeholder="2024 · 春">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">目录标签</label>
                            <input type="text" id="cfg-toc_label" class="form-input" placeholder="目录 Contents">
                        </div>
                        <div class="form-group">
                            <label class="form-label">封面描述</label>
                            <textarea id="cfg-cover_description" class="form-textarea" rows="3" placeholder="用文字记录成长，用影像捕捉瞬间..."></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">封面引言</label>
                            <input type="text" id="cfg-cover_quote" class="form-input" placeholder="不迎合，不妥协，只为真诚表达。">
                        </div>
                    </form>
                </div>

                <div class="card">
                    <h2 class="card-title">板块配置</h2>
                    <div class="form-group">
                        <label class="form-label">文字板块引导语</label>
                        <textarea id="cfg-writing_intro" class="form-textarea" rows="2" placeholder=""写作是灵魂的呼吸...""></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">影像板块引导语</label>
                        <textarea id="cfg-visual_intro" class="form-textarea" rows="2" placeholder=""用镜头捕捉瞬间...""></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">音乐板块引导语</label>
                        <textarea id="cfg-music_intro" class="form-textarea" rows="2" placeholder=""在旋律中寻找共鸣...""></textarea>
                    </div>
                </div>

                <div class="card">
                    <h2 class="card-title">关于页面配置</h2>
                    <div class="form-group">
                        <label class="form-label">关于页面标题</label>
                        <input type="text" id="cfg-about_intro_title" class="form-input" placeholder="关于我">
                    </div>
                    <div class="form-group">
                        <label class="form-label">关于页面正文</label>
                        <textarea id="cfg-about_intro_text" class="form-textarea" rows="4" placeholder="一个普通又不普通的青年人..."></textarea>
                    </div>
                </div>

                <div class="card">
                    <h2 class="card-title">页脚配置</h2>
                    <div class="form-group">
                        <label class="form-label">页脚Logo文字</label>
                        <input type="text" id="cfg-footer_text" class="form-input" placeholder="青年人的自白">
                    </div>
                    <div class="form-group">
                        <label class="form-label">页脚版权信息</label>
                        <input type="text" id="cfg-footer_copyright" class="form-input" placeholder="© 2024">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 16px;">保存所有配置</button>
            </section>
            
            <!-- 活动记录 -->
            <section id="panel-activity" class="panel">
                <div class="card">
                    <h2 class="card-title">最近活动</h2>
                    <div id="activityList" class="activity-list"></div>
                </div>
            </section>
            
            <!-- 账户设置 -->
            <section id="panel-account" class="panel">
                <div class="card">
                    <h2 class="card-title">修改密码</h2>
                    <form id="accountForm">
                        <div class="form-group">
                            <label class="form-label">新密码</label>
                            <input type="password" id="new-password" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">确认新密码</label>
                            <input type="password" id="confirm-password" class="form-input">
                        </div>
                        <button type="submit" class="btn btn-primary">修改密码</button>
                    </form>
                </div>
            </section>
        </div>
    </main>
    
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <script src="admin-app.js"></script>
</body>
</html>
